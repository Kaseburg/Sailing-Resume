  <style>
    /* ================================================================
       CSS — PHASE 1: Foundation, Navigation, Scroll Animations
       Mobile-first responsive design with breakpoints at 768px & 1024px
       ================================================================ */

    /* ── CSS Custom Properties ─────────────────────────── */
    :root {
      --color-primary: #1B3A5C;
      --color-primary-light: #2A5A8C;
      --color-accent: #C9A84C;
      --color-accent-hover: #b8933e;
      --color-bg: #FAFAFA;
      --color-surface: #FFFFFF;
      --color-text: #1A1A2E;
      --color-text-muted: #6B7280;
      --color-border: #E5E7EB;
      --color-gold: #FFD700;
      --color-silver: #C0C0C0;
      --color-bronze: #CD7F32;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --nav-height: 60px;
      --max-width: 960px;
    }

    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
      scroll-padding-top: 70px;
    }
    body {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    img { max-width: 100%; display: block; }
    a {
      color: inherit;
      text-decoration: none;
      transition: color .2s ease;
    }
    a:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
      border-radius: 2px;
    }
    ul { list-style: none; }

    /* ── Layout ────────────────────────────────────────── */
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      width: 100%;
    }

    /* ── Section Spacing — Mobile-first (60px) ─────────── */
    section {
      padding: 3.75rem 1rem;
    }

    /* ── Section Title — Left-aligned with gold accent bar */
    .section-title {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 1.3em;
      background: var(--color-accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Alternating Section Backgrounds ───────────────── */
    #about { background: var(--color-surface); }
    #sailing-experience { background: var(--color-bg); }
    #academics { background: var(--color-surface); }
    #athletics-activities { background: var(--color-bg); }
    #results { background: var(--color-surface); }
    #video { background: var(--color-bg); }
    #schedule { background: var(--color-surface); }
    #contact {
      background: var(--color-primary);
      color: #fff;
    }
    #contact .section-title {
      color: #fff;
    }

    /* ── Hero (placeholder — will be fully styled in Phase 2) */
    #hero {
      position: relative;
      min-height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      background: var(--color-primary);
      padding: 5rem 1rem 4rem;
    }

    /* ── Footer ────────────────────────────────────────── */
    footer {
      background: #0f2440;
      color: rgba(255,255,255,.5);
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: .85rem;
    }
    footer strong { color: var(--color-accent); }

    /* ================================================================
       NAVIGATION — Mobile-first
       Mobile (<1024px): sticky bar + full-screen overlay
       Desktop (1024px+): sticky bar with horizontal links
       ================================================================ */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--color-primary);
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }

    /* ── Brand / Home Link ── */
    nav .brand {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--color-accent);
      white-space: nowrap;
      z-index: 1010;
    }
    nav .brand a {
      color: inherit;
    }

    /* ── Hamburger Button (visible below 1024px) ── */
    .menu-toggle {
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      min-width: 44px;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      z-index: 1010;
    }
    .menu-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: #fff;
      border-radius: 1px;
      transition: transform .3s ease, opacity .3s ease;
    }
    /* ── Hamburger → X animation ── */
    .menu-toggle.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .menu-toggle.open span:nth-child(2) {
      opacity: 0;
    }
    .menu-toggle.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* ── Mobile Nav: Full-Screen Overlay ── */
    nav ul {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--color-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity .3s ease, visibility .3s ease;
    }
    nav ul.open {
      opacity: 1;
      visibility: visible;
    }

    nav ul li a {
      display: block;
      padding: .85rem 1.5rem;
      color: rgba(255,255,255,.8);
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: .5px;
      text-align: center;
      transition: color .2s ease;
    }
    nav ul li a:hover,
    nav ul li a:focus {
      color: var(--color-accent);
    }
    nav ul li a.active {
      color: var(--color-accent);
    }

    /* ================================================================
       SCROLL ANIMATION — Fade-in on scroll
       Applied via .animate-on-scroll class on section containers
       ================================================================ */
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .animate-on-scroll.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ================================================================
       TABLET BREAKPOINT — 768px+
       ================================================================ */
    @media (min-width: 768px) {
      section {
        padding: 5rem 2rem;
      }
      nav {
        padding: 0 2rem;
      }
      .section-title {
        font-size: 1.8rem;
      }
      footer {
        padding: 2rem 2rem;
      }
    }

    /* ================================================================
       DESKTOP BREAKPOINT — 1024px+
       ================================================================ */
    @media (min-width: 1024px) {
      section {
        padding: 6.25rem 2rem;
      }

      /* ── Desktop Nav: horizontal links, no hamburger ── */
      .menu-toggle {
        display: none;
      }
      nav {
        padding: 0 2.5rem;
      }
      nav ul {
        /* Override mobile overlay styles */
        position: static;
        flex-direction: row;
        align-items: center;
        justify-content: flex-end;
        gap: 0;
        opacity: 1;
        visibility: visible;
        background: transparent;
      }
      nav ul li a {
        font-size: .8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .6px;
        padding: .5rem .85rem;
        position: relative;
      }
      /* ── Desktop hover underline effect ── */
      nav ul li a::after {
        content: '';
        position: absolute;
        bottom: 2px;
        left: .85rem;
        right: .85rem;
        height: 2px;
        background: var(--color-accent);
        transform: scaleX(0);
        transform-origin: right;
        transition: transform .25s ease;
      }
      nav ul li a:hover::after,
      nav ul li a.active::after {
        transform: scaleX(1);
        transform-origin: left;
      }
    }

    /* ================================================================
       LARGE DESKTOP — 1280px+
       ================================================================ */
    @media (min-width: 1280px) {
      nav {
        padding: 0 3rem;
      }
    }

    /* ================================================================
       PRINT STYLESHEET
       ================================================================ */
    @media print {
      nav, #hero, #video, .animate-on-scroll {
        display: revert !important;
        opacity: 1 !important;
        transform: none !important;
      }
      nav, #video {
        display: none !important;
      }
      body {
        font-size: 11pt;
        color: #000;
        background: #fff;
      }
      section {
        padding: 12px 0 !important;
        page-break-inside: avoid;
      }
      #contact {
        background: #fff !important;
        color: #000 !important;
      }
      #contact .section-title {
        color: #000 !important;
      }
      a {
        color: #000;
        text-decoration: none;
      }
      a[href^="mailto"]::after,
      a[href^="tel"]::after {
        content: " (" attr(href) ")";
        font-size: 9pt;
      }
      footer {
        background: #fff !important;
        color: #333 !important;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       JAVASCRIPT — Config, Rendering, Interactions

  <script>
    // ╔════════════════════════════════════════════════════════════╗
    // ║  ATHLETE PROFILE — EDIT YOUR INFO BELOW                   ║
    // ║  All placeholder values are marked with [brackets].       ║
    // ║  Replace them with your real information.                 ║
    // ╠════════════════════════════════════════════════════════════╣

    const ATHLETE = {
      // ── Identity ───────────────────────────────────────────
      name: "[Athlete Name]",
      classYear: 2027,
      position: "[Skipper / Crew]",
      school: "[School Name]",
      city: "[City]",
      state: "[State]",
      height: "[Height]",
      weight: "[Weight]",

      // ── Academics ──────────────────────────────────────────
      gpaUnweighted: "[X.XX]",

      act: "[XX]",
      intendedMajor: "[Major]",

      ],
      awards: [
        "[Sailor of the Year or similar]",
        "[Sportsmanship or leadership award]"
      ],

      // ── Athletics & Activities ─────────────────────────────
      otherSports: ["[Sport 1 — X years]", "[Sport 2 — X years]"],
      leadershipRoles: ["[Team captain]", "[Club president]"],
      communityService: "[Organization, hours/commitment]",

      // ── About (bio paragraphs) ─────────────────────────────
      aboutText: "[I have been sailing competitively since age X and currently race with the team at School Name. As a skipper/crew, I specialize in fleet racing and team racing across FJ and CFJ classes. My goal is to compete at the collegiate level while pursuing a degree in my intended major.]",
      aboutText2: "[Off the water, I am involved in activities/clubs/community service. I bring leadership, dedication, and a strong work ethic both on and off the racecourse.]",

      // ── Contact ────────────────────────────────────────────
      email: "[athlete@email.com]",
      phone: "[Phone Number]",
      coachName: "[Coach Name]",
      coachTeam: "[School Name] Sailing Team",
      coachEmail: "[coach@email.com]",
      coachPhone: "[Phone Number]",
      parentName: "[Parent/Guardian Name]",
      parentEmail: "[parent@email.com]",
      parentPhone: "[Phone Number]",

      // ── Links & Media ─────────────────────────────────────
      resumePDF: "#",
      videoURL: "",
      videoCaption: "[Race footage from Event Name, Date. Watch for tactical positioning at the start and mark roundings.]",
      heroImage: "",
      headshotImage: "",
      sailRecruitURL: "",
      techscoreURL: "",

      // ── Meta ───────────────────────────────────────────────
      lastUpdated: "[Month Year]"
    };

    // ── Regatta Results (reverse-chronological, most significant only) ──
    const RESULTS = [
      { date: "Mar 2026", regatta: "PCISA Golden Bear Regatta", division: "A Division", finish: 3, fleetSize: 24, role: "Skipper" },
      { date: "Feb 2026", regatta: "PCISA South #4", division: "A Division", finish: 5, fleetSize: 18, role: "Skipper" },
      { date: "Jan 2026", regatta: "ISSA Baker Team Race Qualifier", division: "Team Race", finish: 2, fleetSize: 12, role: "Skipper" },
      { date: "Nov 2025", regatta: "PCISA North-South Intersectional", division: "B Division", finish: 1, fleetSize: 20, role: "Skipper" },
      { date: "Oct 2025", regatta: "ISSA Mallory Qualifier — District 8", division: "A Division", finish: 4, fleetSize: 16, role: "Skipper" },
      { date: "Sep 2025", regatta: "PCISA Season Opener", division: "A Division", finish: 2, fleetSize: 22, role: "Skipper" },
    ];

    // ── Upcoming Schedule ────────────────────────────────────────────────
    const SCHEDULE = [
      { date: "Apr 5–6, 2026", event: "PCISA South #6", location: "Long Beach, CA", role: "Skipper — A Division" },
      { date: "Apr 18–19, 2026", event: "PCISA Silver PCCs", location: "San Francisco, CA", role: "Skipper — A Division" },
      { date: "May 2–3, 2026", event: "PCISA Gold PCCs", location: "Long Beach, CA", role: "Skipper — A Division" },
      { date: "May 16–17, 2026", event: "ISSA Mallory National Championship", location: "Annapolis, MD", role: "Skipper — A Division" },
    ];


    // ╔════════════════════════════════════════════════════════════╗
    // ║  RENDERING — Builds all HTML from the config above        ║
    // ╚════════════════════════════════════════════════════════════╝

    function renderPage() {
      // ── Update document title & OG tags ──
      document.title = `${ATHLETE.name} — Sailing Recruit, Class of ${ATHLETE.classYear}`;
      setMeta('description', `Recruiting profile for ${ATHLETE.name}, Class of ${ATHLETE.classYear} sailing recruit from ${ATHLETE.school}. ${ATHLETE.position} competing in PCISA and ISSA events.`);
      setOG('og:title', `${ATHLETE.name} — Sailing Recruit, Class of ${ATHLETE.classYear}`);
      setOG('og:description', `${ATHLETE.position} · ${ATHLETE.school} · GPA: ${ATHLETE.gpaUnweighted} · SAT: ${ATHLETE.sat}`);
      if (ATHLETE.heroImage) setOG('og:image', ATHLETE.heroImage);

      // ── Nav brand ──
      document.getElementById('nav-brand').textContent = ATHLETE.name;

      // ── Render all sections ──
      renderHero();
      renderAbout();
      renderSailingExperience();
      renderAcademics();
      renderAthletics();
      renderResults();
      renderVideo();
      renderSchedule();
      renderContact();
      renderFooter();
    }

    // ── Helpers ──
    function setMeta(name, content) {
      const el = document.querySelector(`meta[name="${name}"]`);
      if (el) el.setAttribute('content', content);
    }
    function setOG(property, content) {
      const el = document.querySelector(`meta[property="${property}"]`);
      if (el) el.setAttribute('content', content);
    }
    function ordinal(n) {
      const s = ['th','st','nd','rd'];
      const v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }
    function podiumClass(finish) {
      if (finish === 1) return 'podium-gold';
      if (finish === 2) return 'podium-silver';
      if (finish === 3) return 'podium-bronze';
      return '';
    }

    // ── Section Renderers (placeholder content — built out in later phases) ──

    function renderHero() {
      const el = document.getElementById('hero-content');
      el.innerHTML = `
        <h1>${ATHLETE.name}</h1>
        <p>Class of ${ATHLETE.classYear} · ${ATHLETE.position}</p>
        <p>${ATHLETE.school} · ${ATHLETE.city}, ${ATHLETE.state}</p>
        <p>${ATHLETE.height} · ${ATHLETE.weight}</p>
      `;
    }

    function renderAbout() {
      const el = document.getElementById('about-content');
      el.innerHTML = `
        <h2 class="section-title">About Me</h2>
        <p>${ATHLETE.aboutText}</p>
        <p>${ATHLETE.aboutText2}</p>
      `;
    }

    function renderSailingExperience() {
      const el = document.getElementById('sailing-experience-content');
      el.innerHTML = `
        <h2 class="section-title">Sailing Experience</h2>
        <p>Primary Position: ${ATHLETE.position} · Years Racing: ${ATHLETE.yearsRacing}</p>
      `;
    }

    function renderAcademics() {
      const el = document.getElementById('academics-content');
      el.innerHTML = `
        <h2 class="section-title">Academics</h2>
        <p>GPA: ${ATHLETE.gpaUnweighted} · SAT: ${ATHLETE.sat} · Major: ${ATHLETE.intendedMajor}</p>
      `;
    }

    function renderAthletics() {
      const el = document.getElementById('athletics-content');
      el.innerHTML = `
        <h2 class="section-title">Athletics &amp; Activities</h2>
        <p>${ATHLETE.otherSports.join(', ')}</p>
      `;
    }

    function renderResults() {
      const el = document.getElementById('results-content');
      el.innerHTML = `
        <h2 class="section-title">Sailing Results</h2>
        <p>${RESULTS.length} results loaded</p>
      `;
    }

    function renderVideo() {
      const el = document.getElementById('video-content');
      el.innerHTML = `
        <h2 class="section-title">Sailing Highlight Video</h2>
        <p>Video section placeholder</p>
      `;
    }

    function renderSchedule() {
      const el = document.getElementById('schedule-content');
      el.innerHTML = `
        <h2 class="section-title">Upcoming Schedule</h2>
        <p>${SCHEDULE.length} events loaded</p>
      `;
    }

    function renderContact() {
      const el = document.getElementById('contact-content');
      el.innerHTML = `
        <h2 class="section-title">Contact</h2>
        <p>Contact section placeholder</p>
      `;
    }

    function renderFooter() {
      const el = document.getElementById('footer');
      el.innerHTML = `
        <p><strong>${ATHLETE.name}</strong> · Class of ${ATHLETE.classYear}</p>
        <p>Last updated ${ATHLETE.lastUpdated}</p>
      `;
    }


    // ╔════════════════════════════════════════════════════════════╗
    // ║  INTERACTIONS — Nav, scroll animations, active section    ║
    // ╚════════════════════════════════════════════════════════════╝

    // ── Mobile hamburger menu (full-screen overlay) ──
    const menuToggle = document.getElementById('menu-toggle');
    const navLinks = document.getElementById('nav-links');

    menuToggle.addEventListener('click', function() {
      const isOpen = menuToggle.classList.toggle('open');
      navLinks.classList.toggle('open');
      // Prevent body scroll when overlay is open
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    // Close overlay on link click
    navLinks.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        menuToggle.classList.remove('open');
        navLinks.classList.remove('open');
        document.body.style.overflow = '';
      });
    });

    // ── Scroll reveal animation (Intersection Observer) ──
    const animateObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          animateObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.animate-on-scroll').forEach(function(el) {
      animateObserver.observe(el);
    });

    // ── Active nav link highlighting (Intersection Observer) ──
    const sections = document.querySelectorAll('main section[id]');
    const navItems = document.querySelectorAll('#nav-links a');

    const sectionObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          const id = entry.target.getAttribute('id');
          navItems.forEach(function(a) {
            a.classList.toggle('active', a.getAttribute('href') === '#' + id);
          });
        }
      });
    }, { rootMargin: '-30% 0px -70% 0px' });

    sections.forEach(function(section) {
      sectionObserver.observe(section);
    });


    // ── Initialize ──
    renderPage();
  </script>

</body>
</html>
