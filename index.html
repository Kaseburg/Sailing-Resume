<html lang="en">
<head>

  <meta property="og:description" content="[Position] · [School Name] · GPA: [X.XX] · SAT: [XXXX]">

  <!-- Favicon — inline SVG sailboat -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M32 4 L32 44 L8 44 Z' fill='%231B3A5C'/%3E%3Cpath d='M34 12 L34 44 L56 44 Z' fill='%23C9A84C'/%3E%3Cpath d='M4 48 Q32 40 60 48 L56 56 L8 56 Z' fill='%231B3A5C'/%3E%3C/svg%3E">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    /* ================================================================
       CSS — PHASE 1: Foundation, Navigation, Scroll Animations
       Mobile-first responsive design with breakpoints at 768px & 1024px
       ================================================================ */

    /* ── CSS Custom Properties ─────────────────────────── */
    :root {
      --color-primary: #1B3A5C;
      --color-primary-light: #2A5A8C;
      --color-accent: #C9A84C;
      --color-accent-hover: #b8933e;
      --color-bg: #FAFAFA;
      --color-surface: #FFFFFF;
      --color-text: #1A1A2E;
      --color-text-muted: #6B7280;
      --color-border: #E5E7EB;
      --color-gold: #FFD700;
      --color-silver: #C0C0C0;
      --color-bronze: #CD7F32;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --nav-height: 60px;
      --max-width: 960px;
    }

    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
      scroll-padding-top: 70px;
    }
    body {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    img { max-width: 100%; display: block; }
    a {
      color: inherit;
      text-decoration: none;
      transition: color .2s ease;
    }
    /* ── Focus States (accessibility) ── */
    :focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }
    a:focus-visible {
      border-radius: 2px;
    }
    ul { list-style: none; }

    /* ── Skip to Content Link (accessibility) ── */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      padding: 8px 16px;
      background: var(--color-accent);
      color: #000;
      font-weight: 600;
      font-size: .9rem;
      z-index: 2000;
      transition: top .2s ease;
    }
    .skip-link:focus {
      top: 0;
    }

    /* ── Layout ────────────────────────────────────────── */
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      width: 100%;
    }

    /* ── Section Spacing — Mobile-first (60px) ─────────── */
    section {
      padding: 1.5rem 1rem;
    }

    /* ── Section Title — Left-aligned with gold accent bar */
    .section-title {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: .75rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 1.3em;
      background: var(--color-accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Alternating Section Backgrounds ───────────────── */
    #about { background: var(--color-surface); }
    #sailing-experience { background: var(--color-bg); }
    #academics { background: var(--color-surface); }
    #athletics-activities { background: var(--color-bg); }
    #results { background: var(--color-surface); }
    #video { background: var(--color-bg); }
    #schedule { background: var(--color-surface); }
    #contact {
      background: var(--color-primary);
      color: #fff;
    }
    #contact .section-title {
      color: #fff;
    }

    /* ================================================================
       HERO SECTION
       ================================================================ */
    #hero {
      position: relative;
      min-height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      background: var(--color-primary);
      padding: 4rem 1rem 2rem;
      overflow: hidden;
    }
    /* ── Dark overlay when hero image is present ── */
    #hero.has-image {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    #hero.has-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(11, 29, 58, .82) 0%,
        rgba(27, 58, 92, .7) 50%,
        rgba(11, 29, 58, .85) 100%
      );
      z-index: 1;
    }
    #hero .hero-content {
      position: relative;
      z-index: 2;
    }

    /* ── Hero Typography ── */
    .hero-name {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: .4rem;
    }
    .hero-subtitle {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--color-accent);
      margin-bottom: .5rem;
    }
    .hero-details {
      font-size: .95rem;
      color: rgba(255,255,255,.75);
      margin-bottom: .2rem;
    }

    /* ── Hero Stat Cards — 2×2 grid on mobile ── */
    .hero-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      margin: 1.75rem auto 0;
      max-width: 400px;
    }
    .hero-stat {
      background: rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    .hero-stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
    }
    .hero-stat-label {
      font-size: .7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,.6);
      margin-top: .15rem;
    }

    /* ── Hero CTA Buttons ── */
    .hero-cta {
      display: flex;
      justify-content: center;
      gap: .75rem;
      margin-top: 1.75rem;
    }
    .hero-cta-resume-stack {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }
    .hero-cta .btn-outline {
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn {
      display: inline-block;
      padding: .75rem 1.75rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .3px;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
      text-align: center;
      border: none;
      min-width: 44px;
      min-height: 44px;
    }
    .btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }
    .btn:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
    .btn-primary {
      background: var(--color-accent);
      color: var(--color-text);
    }
    .btn-primary:hover {
      background: var(--color-accent-hover);
      color: var(--color-text);
    }
    .btn-outline {
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255,255,255,.6);
    }
    .btn-outline:hover {
      border-color: #fff;
      color: #fff;
    }

    /* ================================================================
       LOGOS SECTION
       ================================================================ */
    .logos-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 3rem;
      padding: .75rem 0;
      background: var(--color-bg);
    }
    .logos-bar img {
      height: 80px;
      max-height: 12vw;
      width: auto;
      object-fit: contain;
      flex-shrink: 1;
      min-width: 0;
    }

    /* ================================================================
       ABOUT SECTION
       ================================================================ */
    .about-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .about-headshot {
      width: 200px;
      height: 200px;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .about-headshot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* ── Placeholder silhouette when no image ── */
    .about-headshot-placeholder {
      color: rgba(255,255,255,.3);
    }
    .about-headshot-placeholder svg {
      width: 80px;
      height: 80px;
    }
    .about-text p {
      color: var(--color-text-muted);
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .about-text p:last-child {
      margin-bottom: 0;
    }

    /* ================================================================
       SAILING EXPERIENCE SECTION
       ================================================================ */
    .boat-classes-grid {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.75rem;
      padding: 0 1rem;
    }
    .boat-classes-grid img {
      height: 60px;
      max-height: 9vw;
      width: auto;
      object-fit: contain;
      flex-shrink: 1;
      min-width: 0;
    }
    .sailing-info-card {
      background: var(--color-surface);
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 1.25rem;
      margin-bottom: 1.75rem;
    }
    .sailing-info-top {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--color-border);
    }
    .sailing-info-item-label {
      font-size: .7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--color-text-muted);
      margin-bottom: .15rem;
    }
    .sailing-info-item-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-primary);
    }
    .sailing-info-row {
      padding: .75rem 0;
    }
    .sailing-info-row + .sailing-info-row {
      border-top: 1px solid var(--color-border);
    }
    .sailing-info-row-label {
      font-size: .7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--color-text-muted);
      margin-bottom: .25rem;
    }
    .sailing-info-row-value {
      font-size: .95rem;
      color: var(--color-text);
    }

    .sailing-sub-heading {
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: .5rem;
    }
    .sailing-list {
      margin-bottom: 1.5rem;
    }
    .sailing-list li {
      position: relative;
      padding-left: 1.1rem;
      margin-bottom: .35rem;
      font-size: .95rem;
      color: var(--color-text-muted);
      line-height: 1.5;
    }
    .sailing-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: .55em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-accent);
    }

    /* ================================================================
       ACADEMICS SECTION
       ================================================================ */
    .academics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }
    .acad-card {
      background: var(--color-surface);
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 1.25rem;
      text-align: center;
    }
    .acad-card-value {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1.2;
      margin-bottom: .2rem;
    }
    .acad-card-label {
      font-size: .7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--color-text-muted);
    }

    .courses-heading {
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-primary);
      margin: 1.75rem 0 .75rem;
    }
    .course-pills {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .course-pill {
      background: rgba(27, 58, 92, .1);
      color: var(--color-primary);
      border-radius: 20px;
      padding: .25rem .875rem;
      font-size: .85rem;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ================================================================
       ATHLETICS & ACTIVITIES SECTION
       ================================================================ */
    .athletics-card {
      background: var(--color-surface);
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 1.5rem;
    }
    .athletics-row {
      margin-bottom: 1rem;
    }
    .athletics-row:last-child {
      margin-bottom: 0;
    }
    .athletics-label {
      font-size: .95rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: .15rem;
    }
    .athletics-value {
      font-size: .95rem;
      color: var(--color-text-muted);
      line-height: 1.5;
    }

    /* ================================================================
       RESULTS SECTION
       ================================================================ */

    /* ── Results Tabs ── */
    .results-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    .results-tab {
      padding: .5rem 1.25rem;
      border: 2px solid var(--color-primary);
      border-radius: 6px;
      background: transparent;
      color: var(--color-primary);
      font-family: var(--font-body);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .results-tab:hover {
      background: rgba(31,55,95,.1);
    }
    .results-tab.active {
      background: var(--color-primary);
      color: #fff;
    }

    /* ── Desktop Table (hidden on mobile) ── */
    .results-table-wrap {
      display: none;
    }
    .results-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .results-table thead th {
      background: var(--color-primary);
      color: #fff;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: .75rem 1rem;
      text-align: left;
      white-space: nowrap;
    }
    .results-table tbody tr {
      transition: background .15s ease;
    }
    .results-table tbody tr:nth-child(odd) { background: var(--color-surface); }
    .results-table tbody tr:nth-child(even) { background: #F9FAFB; }
    .results-table tbody tr:hover { background: #EEF2F7; }
    .results-table tbody td {
      padding: .75rem 1rem;
      font-size: .9rem;
      color: var(--color-text);
      border-left: 4px solid transparent;
    }
    .results-table tbody td:first-child { border-left-width: 4px; }
    .results-table tbody tr.podium-gold td:first-child { border-left-color: var(--color-gold); }
    .results-table tbody tr.podium-silver td:first-child { border-left-color: var(--color-silver); }
    .results-table tbody tr.podium-bronze td:first-child { border-left-color: var(--color-bronze); }
    /* Only first td gets the left border */
    .results-table tbody td:not(:first-child) { border-left: none; }

    /* ── Podium Badge ── */
    .podium-badge {
      display: inline-block;
      padding: .125rem .5rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: .8rem;
      line-height: 1.4;
    }
    .podium-badge-gold { background: var(--color-gold); color: #1a1a2e; }
    .podium-badge-silver { background: var(--color-silver); color: #1a1a2e; }
    .podium-badge-bronze { background: var(--color-bronze); color: #fff; }

    /* ── Mobile Cards (shown on mobile, hidden on tablet+) ── */
    .results-cards {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }
    .result-card {
      background: var(--color-surface);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 1rem;
      border-left: 4px solid transparent;
    }
    .result-card.podium-gold { border-left-color: var(--color-gold); }
    .result-card.podium-silver { border-left-color: var(--color-silver); }
    .result-card.podium-bronze { border-left-color: var(--color-bronze); }
    .result-card-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: .2rem;
    }
    .result-card-meta {
      font-size: .85rem;
      color: var(--color-text-muted);
      margin-bottom: .5rem;
    }
    .result-card-finish {
      font-size: .9rem;
      color: var(--color-text);
    }

    .results-footer {
      margin-top: 1.25rem;
      font-size: .85rem;
      color: var(--color-text-muted);
    }
    .results-footer a {
      color: var(--color-primary-light);
      text-decoration: underline;
    }
    .results-footer a:hover {
      color: var(--color-primary);
    }

    /* ================================================================
       SLIDESHOW / ACTION PHOTOS SECTION
       ================================================================ */
    .slideshow-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      background: var(--color-primary);
    }
    .slideshow-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity .6s ease;
    }
    .slideshow-wrapper img.active {
      opacity: 1;
    }
    .slideshow-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,.45);
      color: #fff;
      border: none;
      font-size: 2rem;
      line-height: 1;
      padding: .25rem .6rem;
      cursor: pointer;
      border-radius: 6px;
      z-index: 2;
      transition: background .2s;
      user-select: none;
    }
    .slideshow-arrow:hover {
      background: rgba(0,0,0,.7);
    }
    .slideshow-arrow.left { left: .75rem; }
    .slideshow-arrow.right { right: .75rem; }

    /* ================================================================
       SCHEDULE SECTION
       ================================================================ */
    .schedule-intro {
      font-size: .95rem;
      color: var(--color-text-muted);
      font-style: italic;
      margin-bottom: 1.25rem;
    }

    /* ── Desktop Table (hidden on mobile) ── */
    .schedule-table-wrap {
      display: none;
    }
    .schedule-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .schedule-table thead th {
      background: var(--color-primary);
      color: #fff;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: .75rem 1rem;
      text-align: left;
      white-space: nowrap;
    }
    .schedule-table tbody tr {
      transition: background .15s ease;
    }
    .schedule-table tbody tr:nth-child(odd) { background: var(--color-surface); }
    .schedule-table tbody tr:nth-child(even) { background: #F9FAFB; }
    .schedule-table tbody tr:hover { background: #EEF2F7; }
    .schedule-table tbody td {
      padding: .75rem 1rem;
      font-size: .9rem;
      color: var(--color-text);
    }

    /* ── Mobile Cards (shown on mobile, hidden on tablet+) ── */
    .schedule-cards {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }
    .schedule-card {
      background: var(--color-surface);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 1rem;
    }
    .schedule-card-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: .2rem;
    }
    .schedule-card-date {
      font-size: .9rem;
      color: var(--color-text);
      margin-bottom: .15rem;
    }
    .schedule-card-location {
      font-size: .85rem;
      color: var(--color-text-muted);
      margin-bottom: .15rem;
    }
    .schedule-card-role {
      font-size: .85rem;
      color: var(--color-text-muted);
    }

    /* ================================================================
       CONTACT SECTION
       ================================================================ */
    .contact-intro {
      font-size: .95rem;
      font-style: italic;
      color: rgba(255,255,255,.65);
      text-align: center;
      margin-bottom: 2rem;
    }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: .75rem;
    }
    .contact-card {
      background: rgba(255,255,255,.08);
      border-radius: 12px;

       NAVIGATION — Mobile-first

       Desktop (1024px+): sticky bar with horizontal links
       ================================================================ */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--color-primary);
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }

    /* ── Brand / Home Link ── */

      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--color-accent);
      white-space: nowrap;
      z-index: 1010;
    }
    nav .brand a {
      color: inherit;
    }

    /* ── Hamburger Button (visible below 1024px) ── */
    .menu-toggle {
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      min-width: 44px;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      z-index: 1010;
    }
    .menu-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: #fff;
      border-radius: 1px;
      transition: transform .3s ease, opacity .3s ease;
    }
    /* ── Hamburger → X animation ── */
    .menu-toggle.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .menu-toggle.open span:nth-child(2) {
      opacity: 0;
    }
    .menu-toggle.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* ── Mobile Nav: Full-Screen Overlay ── */
    nav ul {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--color-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity .3s ease, visibility .3s ease;
    }
    nav ul.open {
      opacity: 1;
      visibility: visible;
    }

    nav ul li a {
      display: block;
      padding: .85rem 1.5rem;
      color: rgba(255,255,255,.8);
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: .5px;
      text-align: center;
      transition: color .2s ease;
    }
    nav ul li a:hover,
    nav ul li a:focus {
      color: var(--color-accent);
    }
    nav ul li a.active {
      color: var(--color-accent);
    }

    /* ================================================================
       SCROLL ANIMATION — Fade-in on scroll
       Applied via .animate-on-scroll class on section containers
       ================================================================ */
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .animate-on-scroll.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ================================================================
       TABLET BREAKPOINT — 768px+
       ================================================================ */

    }

        align-items: flex-start;
        gap: 2.5rem;
      }

      }
      .sailing-info-card {
        padding: 1.75rem;

        gap: 1rem;

      .acad-card {
        padding: 1.5rem;

        gap: 1.5rem;
      }
      .contact-card {
        padding: 1.75rem;
      }
    }

    /* ================================================================
       DESKTOP BREAKPOINT — 1024px+
       ================================================================ */

        padding: 2.5rem 2rem;

      nav {

      }
      nav ul {

        position: static;
        flex-direction: row;

       ================================================================ */

       ================================================================ */

      }

      /* Reset body for print */
      body {
        font-size: 11pt;
        color: #000;
        background: #fff;
        margin: 0;
        padding: 0;
      }

      /* Section resets */

        box-shadow: none !important;

      footer {

        padding: 12px 0 !important;
      }
      footer strong { color: #000 !important; }
    }

    function renderPage() {

      document.title = `${ATHLETE.name} — Recruit, Class of ${ATHLETE.classYear}`;
      setMeta('description', `Recruiting profile for ${ATHLETE.name}, Class of ${ATHLETE.classYear} sailing recruit from ${ATHLETE.school}. ${ATHLETE.position} competing in PCISA and ISSA events.`);
      setOG('og:title', `${ATHLETE.name} — Recruit, Class of ${ATHLETE.classYear}`);
      setOG('og:description', `${ATHLETE.position} · ${ATHLETE.school} · GPA: ${ATHLETE.gpaUnweighted} · SAT: ${ATHLETE.sat}`);
      if (ATHLETE.heroImage) setOG('og:image', ATHLETE.heroImage);

      // ── Nav brand ──
      document.getElementById('nav-brand').textContent = ATHLETE.name;

      // ── Render all sections ──
      renderHero();
      renderAbout();
      renderSailingExperience();
      renderAcademics();
      renderAthletics();
      renderResults();
      renderSlideshow();
      renderSchedule();
      renderContact();
      renderFooter();

    // ── Helpers ──
    function setMeta(name, content) {
      const el = document.querySelector(`meta[name="${name}"]`);
      if (el) el.setAttribute('content', content);
    }
    function setOG(property, content) {
      const el = document.querySelector(`meta[property="${property}"]`);
      if (el) el.setAttribute('content', content);
    }
    function ordinal(n) {
      const s = ['th','st','nd','rd'];
      const v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }
    function podiumClass(finish) {
      if (finish === 1) return 'podium-gold';
      if (finish === 2) return 'podium-silver';
      if (finish === 3) return 'podium-bronze';
      return '';
    }

      var tableHTML, cardsHTML, emptyHTML = '', footerHTML = '';

      if (activeResultsCategory === 'Clinics') {
        // Clinics tab — different columns

          return '<tr>'
            + '<td>' + c.year + '</td>'

                <th>Boat</th>

          </table>`;
        cardsHTML = cards;

      } else if (activeResultsCategory === 'Awards') {
        // Awards tab — Year and Award columns
        // Group by year
        var byYear = {};
        AWARDS.forEach(function(a) {
          if (!byYear[a.year]) byYear[a.year] = [];
          byYear[a.year].push(a.award);
        });
        var years = Object.keys(byYear).sort(function(a, b) { return b - a; });

        var tableRows = '';
        years.forEach(function(year) {
          byYear[year].forEach(function(award, i) {
            tableRows += '<tr>'
              + '<td>' + (i === 0 ? year : '') + '</td>'
              + '<td>' + award + '</td>'

        var cards = AWARDS.map(function(a) {

            <thead>

                <th>Year</th>
                <th>Award</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>`;
        cardsHTML = cards;

      } else {
        // Standard results tab
        const filtered = RESULTS.filter(function(r) {
          return r.category === activeResultsCategory;
        });

        const tableRows = filtered.map(function(r) {
          const pc = podiumClass(r.finish);
          const finishHTML = finishBadge(r.finish);
          return '<tr class="' + pc + '">'
            + '<td>' + r.date + '</td>'
            + '<td>' + r.regatta + '</td>'
            + '<td>' + r.division + '</td>'
            + '<td>' + r.role + '</td>'
            + '<td>' + finishHTML + '</td>'
            + '<td>' + r.fleetSize + ' boats</td>'
            + '</tr>';
        }).join('');

        const cards = filtered.map(function(r) {
          const pc = podiumClass(r.finish);
          const finishHTML = finishBadge(r.finish);
          return '<div class="result-card ' + pc + '">'
            + '<div class="result-card-name">' + r.regatta + '</div>'
            + '<div class="result-card-meta">' + r.date + ' &middot; ' + r.division + ' &middot; ' + r.role + '</div>'
            + '<div class="result-card-finish">' + finishHTML + ' of ' + r.fleetSize + ' boats</div>'

    function finishBadge(finish) {
      const o = ordinal(finish);
      if (finish === 1) return '<span class="podium-badge podium-badge-gold">' + o + '</span>';
      if (finish === 2) return '<span class="podium-badge podium-badge-silver">' + o + '</span>';
      if (finish === 3) return '<span class="podium-badge podium-badge-bronze">' + o + '</span>';
      return o;
    }

    function renderSlideshow() {
      const el = document.getElementById('slideshow-content');
      const images = ATHLETE.slideshowImages;

      if (!images.length) {
        el.innerHTML = '<h2 class="section-title">Photos</h2><p style="color:var(--color-text-muted);font-style:italic;">Photos coming soon.</p>';
        return;
      }

      const imgsHTML = images.map(function(src, i) {
        return '<img src="' + src + '" alt="Action photo ' + (i + 1) + '"' + (i === 0 ? ' class="active"' : '') + '>';
      }).join('');

      el.innerHTML = `
        <h2 class="section-title">Photos</h2>
        <div class="slideshow-wrapper">
          ${imgsHTML}
          <button class="slideshow-arrow left" aria-label="Previous photo">&#8249;</button>
          <button class="slideshow-arrow right" aria-label="Next photo">&#8250;</button>
        </div>
      `;

      // Slideshow logic
      var wrapper = el.querySelector('.slideshow-wrapper');
      var imgs = wrapper.querySelectorAll('img');
      var current = 0;
      var autoInterval = null;
      var idleTimeout = null;
      var manualMode = false;

      function showSlide(index) {
        imgs[current].classList.remove('active');
        current = (index + imgs.length) % imgs.length;
        imgs[current].classList.add('active');
      }

      function startAuto() {
        stopAuto();
        autoInterval = setInterval(function() {
          showSlide(current + 1);
        }, 3000);
      }

      function stopAuto() {
        if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
      }

      function onManualNav(direction) {
        manualMode = true;
        stopAuto();
        showSlide(current + direction);
        // Reset idle timer
        if (idleTimeout) clearTimeout(idleTimeout);
        idleTimeout = setTimeout(function() {
          manualMode = false;
          startAuto();
        }, 20000);
      }

      wrapper.querySelector('.slideshow-arrow.left').addEventListener('click', function() { onManualNav(-1); });
      wrapper.querySelector('.slideshow-arrow.right').addEventListener('click', function() { onManualNav(1); });

      startAuto();
    }

    }


    function getLastUpdatedLabel() {
      const parsed = Date.parse(document.lastModified);
      if (!Number.isNaN(parsed)) {
        return new Date(parsed).toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'long'
        });
      }
      return ATHLETE.lastUpdated;
    }

    function renderFooter() {
      const el = document.getElementById('footer');
      const lastUpdatedLabel = getLastUpdatedLabel();
      el.innerHTML = `
        <p><strong>${ATHLETE.name}</strong> &middot; Class of ${ATHLETE.classYear}</p>
        <p>Last updated ${lastUpdatedLabel}</p>
      `;
    }


    // ╔════════════════════════════════════════════════════════════╗
    // ║  INTERACTIONS — Nav, scroll animations, active section    ║
    // ╚════════════════════════════════════════════════════════════╝

    // ── Mobile hamburger menu (full-screen overlay) ──
    const menuToggle = document.getElementById('menu-toggle');
    const navLinks = document.getElementById('nav-links');

    menuToggle.addEventListener('click', function() {
      const isOpen = menuToggle.classList.toggle('open');
      navLinks.classList.toggle('open');
      // Prevent body scroll when overlay is open
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    // Close overlay on link click
    navLinks.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        menuToggle.classList.remove('open');
        navLinks.classList.remove('open');
        document.body.style.overflow = '';
      });
    });

    // ── Scroll reveal animation (Intersection Observer) ──
    const animateObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          animateObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.animate-on-scroll').forEach(function(el) {
      animateObserver.observe(el);
    });

    // ── Active nav link highlighting (Intersection Observer) ──
    const sections = document.querySelectorAll('main section[id]');
    const navItems = document.querySelectorAll('#nav-links a');

    const sectionObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          const id = entry.target.getAttribute('id');
          navItems.forEach(function(a) {
            a.classList.toggle('active', a.getAttribute('href') === '#' + id);
          });
        }
      });
    }, { rootMargin: '-30% 0px -70% 0px' });

    sections.forEach(function(section) {
      sectionObserver.observe(section);
    });


    // ── Initialize ──
    renderPage();
  </script>

</body>
</html>
